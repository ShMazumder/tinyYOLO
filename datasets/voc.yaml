# TinyYOLO Dataset Configuration — Pascal VOC 2007+2012
# ======================================================
# 20 classes, ~16.5K train + ~5K val images
# Download: automatic via Ultralytics built-in VOC.yaml
#
# Ultralytics VOC structure after download:
#   datasets/VOC/
#   ├── images/
#   │   ├── train2012/    (5717 images)
#   │   ├── train2007/    (2501 images)
#   │   ├── val2012/      (5823 images)
#   │   ├── val2007/      (2510 images)
#   │   └── test2007/     (4952 images)
#   └── labels/
#       ├── train2012/
#       ├── train2007/
#       ├── val2012/
#       ├── val2007/
#       └── test2007/

path: datasets/VOC

# Train: all 2007+2012 train+val images (~16.5K)
train:
  - images/train2012
  - images/train2007
  - images/val2012
  - images/val2007

# Val: 2007 test set (~5K)
val:
  - images/test2007

# Number of classes
nc: 20

# Class names
names:
  0: aeroplane
  1: bicycle
  2: bird
  3: boat
  4: bottle
  5: bus
  6: car
  7: cat
  8: chair
  9: cow
  10: diningtable
  11: dog
  12: horse
  13: motorbike
  14: person
  15: pottedplant
  16: sheep
  17: sofa
  18: train
  19: tvmonitor
