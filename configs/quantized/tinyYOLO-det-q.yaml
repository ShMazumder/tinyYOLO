# TinyYOLO Detection — Quantized (INT8-safe) Architecture
# Activation: ReLU6 | Attention: ECABlock only | No spatial attention
# Channels aligned to multiples of 8 for SIMD
# Loss: CIoU + BCE (v2)

task: det
variant: quantized
nc: 80

backbone:
  channels: [16, 24, 40, 80, 160]  # All multiples of 8
  depths: [1, 1, 2, 3, 2]
  attention: eca  # INT8-safe channel attention only

neck:
  type: LitePAN
  out_channel: 64

head:
  type: TinyDetect
  reg_max: 0

loss:
  type: CIoU+BCE
  box_weight: 2.0
  cls_weight: 1.0
  obj_weight: 1.0

batchnorm:
  eps: 0.001
  momentum: 0.03

quantization:
  enabled: true
  method: qat  # Quantization-Aware Training
  backend: qnnpack  # Mobile-optimized
  calibration_batches: 100

training:
  epochs: 150
  optimizer: AdamW
  lr0: 0.001
  lrf: 0.01
  weight_decay: 0.0001
  weight_decay_no_bias: true
  warmup_epochs: 5  # R1: linear warmup (per-iteration granularity)
  scheduler: cosine
  seed: 42  # R1: deterministic training
  assignment: tal  # R1: Task-Aligned Label Assignment (k=10)

augmentation:
  mosaic: 1.0
  mixup: 0.1
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  translate: 0.1
  scale: 0.5
  fliplr: 0.5
  grayscale: 0.1
  perspective: 0.15  # R1: reduced from 0.2
  mosaic_disable_pct: 0.1  # R1: disable mosaic for last 10% of training
