# TinyYOLO Pose — Quantized (INT8-safe)
task: pose
variant: quantized
nc: 1

backbone:
  channels: [16, 24, 40, 80, 160]
  depths: [1, 1, 2, 3, 2]
  attention: eca

neck:
  type: LitePAN
  out_channel: 64

head:
  type: TinyPose
  reg_max: 0
  nk: 17
  ndim: 3

quantization:
  enabled: true
  method: qat
  backend: qnnpack
  calibration_batches: 100

training:
  epochs: 150
  optimizer: AdamW
  lr0: 0.001
  lrf: 0.01
  weight_decay: 0.01
  warmup_epochs: 5
  scheduler: cosine

augmentation:
  mosaic: 1.0
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  translate: 0.1
  scale: 0.5
  fliplr: 0.5
