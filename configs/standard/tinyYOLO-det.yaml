# TinyYOLO Detection — Standard Architecture
# GhostNet backbone + LitePAN neck + Decoupled anchor-free head
# Activation: SiLU | Attention: LightSpatialAttn + SEBlock
# Loss: CIoU + BCE (v2)

task: det
variant: standard
nc: 80  # COCO classes

backbone:
  channels: [16, 24, 40, 80, 160]
  depths: [1, 1, 2, 3, 2]
  attention: spatial  # LightSpatialAttn on P4, SEBlock on P5

neck:
  type: LitePAN
  out_channel: 64

head:
  type: TinyDetect
  reg_max: 0  # No DFL — direct regression

loss:
  type: CIoU+BCE
  box_weight: 2.0    # CIoU box regression
  cls_weight: 1.0    # BCE classification
  obj_weight: 1.0    # BCE objectness

batchnorm:
  eps: 0.001          # YOLO-standard (not PyTorch default 1e-5)
  momentum: 0.03      # YOLO-standard (not PyTorch default 0.1)

training:
  epochs: 150
  optimizer: AdamW
  lr0: 0.001
  lrf: 0.01  # Final LR = lr0 * lrf
  weight_decay: 0.0001  # Applied to weights only (dim >= 2)
  weight_decay_no_bias: true  # Biases/BN excluded from decay
  warmup_epochs: 3  # R1: linear warmup (per-iteration granularity)
  scheduler: cosine
  label_smoothing: 0.0
  seed: 42  # R1: deterministic training
  assignment: tal  # R1: Task-Aligned Label Assignment (k=10)

augmentation:
  mosaic: 1.0
  mixup: 0.1
  copy_paste: 0.1
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  shear: 0.0
  flipud: 0.0
  fliplr: 0.5
  grayscale: 0.1
  perspective: 0.15  # R1: reduced from 0.2
  mosaic_disable_pct: 0.1  # R1: disable mosaic for last 10% of training
