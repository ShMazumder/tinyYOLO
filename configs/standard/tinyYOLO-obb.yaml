# TinyYOLO Oriented BBox — Standard Architecture
task: obb
variant: standard
nc: 15  # DOTA classes

backbone:
  channels: [16, 24, 40, 80, 160]
  depths: [1, 1, 2, 3, 2]
  attention: spatial

neck:
  type: LitePAN
  out_channel: 64

head:
  type: TinyOBB
  reg_max: 0

loss:
  type: CIoU+BCE
  box_weight: 2.0
  cls_weight: 1.0
  obj_weight: 1.0

batchnorm:
  eps: 0.001
  momentum: 0.03

training:
  epochs: 150
  optimizer: AdamW
  lr0: 0.001
  lrf: 0.01
  weight_decay: 0.0001
  weight_decay_no_bias: true
  warmup_epochs: 5
  scheduler: cosine

augmentation:
  mosaic: 1.0
  mixup: 0.0
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  translate: 0.1
  scale: 0.5
  fliplr: 0.5
  flipud: 0.5  # Useful for aerial imagery
  grayscale: 0.1
  perspective: 0.15  # R1: reduced from 0.2
